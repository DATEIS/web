name: Validate & Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

env:
  PR_NUMBER: ${{ github.event.number }}
  REPO_NAME: ${{ github.event.repository.name }}
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  pre-commit:
    name: 🔧 Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: |
          pip install pre-commit
          pre-commit install

      - name: Run pre-commit on all files
        id: precommit
        run: |
          # Запускаем pre-commit на всех файлах
          pre-commit run --all-files --show-diff-on-failure

      - name: Upload pre-commit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: precommit-report
          path: |
            .pre-commit-hooks.log
            .pre-commit-report.txt
          retention-days: 3

  validate-html:
    name: 🔍 HTML Validation (W3C)
    runs-on: ubuntu-latest
    needs: [pre-commit]
    if: needs.pre-commit.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML with W3C API
        id: html-check
        run: |
          # Отправляем HTML на валидатор W3C
          curl -s -H "Content-Type: text/html; charset=utf-8" \
               --data-binary @index.html \
               https://validator.w3.org/nu/?out=json \
               -o validation-result.json

          # Проверяем, есть ли ошибки в JSON ответе
          if grep -q '"type":"error"' validation-result.json; then
            echo "❌ Найдены ошибки в HTML!"
            echo ""
            echo "Детали ошибок:"
            cat validation-result.json | grep -A2 '"type":"error"' || true
            exit 1
          else
            echo "✅ HTML валидация пройдена успешно!"
          fi

  validate-css:
    name: 🎨 CSS Validation (W3C)
    runs-on: ubuntu-latest
    needs: [pre-commit]
    if: needs.pre-commit.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate CSS with W3C API
        id: css-check
        run: |
          # Отправляем CSS на валидатор W3C
          curl -s -H "Content-Type: text/css; charset=utf-8" \
               --data-binary @style.css \
               "https://jigsaw.w3.org/css-validator/validator?output=json&text=true" \
               -o validation-result.json

          # Проверяем результат
          if grep -q '"validity": false' validation-result.json; then
            echo "❌ Найдены ошибки в CSS!"
            echo ""
            echo "Детали ошибок:"
            cat validation-result.json | grep -A5 '"message"' || true
            exit 1
          else
            echo "✅ CSS валидация пройдена успешно!"
          fi

  validate-js:
    name: 📜 JavaScript Validation (ESLint)
    runs-on: ubuntu-latest
    needs: [pre-commit]
    if: needs.pre-commit.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ESLint (совместимая версия)
        run: npm install -g eslint@8.57.0

      - name: Create ESLint config (старый формат)
        run: |
          echo '{
            "env": {
              "browser": true,
              "es2021": true
            },
            "extends": "eslint:recommended",
            "parserOptions": {
              "ecmaVersion": "latest"
            }
          }' > .eslintrc.json

      - name: Validate JavaScript files
        run: |
          eslint js/*.js --format=stylish --max-warnings=0

  deploy-preview:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [validate-html, validate-css, validate-js]
    if: |
      needs.validate-html.result == 'success' &&
      needs.validate-css.result == 'success' &&
      needs.validate-js.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare files for deployment
        run: |
          mkdir -p deploy_preview
          cp index.html deploy_preview/
          cp style.css deploy_preview/
          cp -r js deploy_preview/
          cp -r fonts deploy_preview/
          cp -r img deploy_preview/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy_preview
          destination_dir: pr-preview/pr-${{ github.event.number }}
          keep_files: false

  comment-results:
    name: 💬 Post Results to PR
    runs-on: ubuntu-latest
    needs: [validate-html, validate-css, validate-js, deploy-preview]
    if: always()
    steps:
      - name: Set preview URL variable
        id: vars
        run: |
          PREVIEW_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.number }}/"
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Create comment with status
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: full-validation-report
          message: |
            ## 🚀 Pull Request Preview & Validation Report

            ### 📊 Checks status

            | Test | Status |
            |----------|--------|
            | 🔍 **HTML (W3C Validator)** | ${{ needs.validate-html.result == 'success' && '✅' || '❌' }} |
            | 🎨 **CSS (W3C Validator)** | ${{ needs.validate-css.result == 'success' && '✅' || '❌' }} |
            | 📜 **JavaScript (ESLint)** | ${{ needs.validate-js.result == 'success' && '✅' || '❌' }} |
            | 🚀 **Deploy to Pages** | ${{ needs.deploy-preview.result == 'success' && '✅' || (needs.deploy-preview.result == 'skipped' && '⏭️' || '❌') }} |

            ${{ needs.deploy-preview.result == 'success' && format('**🔗 Preview:** {0}', steps.vars.outputs.preview_url) || '' }}

            ---

            ### 📝 What mean statuses:
            - ✅ Success
            - ❌ Error
            - ⏭️ Skiped

            ---
            *This comment is updated automatically*